server:
  port: 8080

spring:
  application:
    name: discord-bot-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:bot-group}
      auto-offset-reset: earliest

bot:
  token: ${BOT_TOKEN:example-token}